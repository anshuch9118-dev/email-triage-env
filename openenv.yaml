version: 1

tasks:
  - name: classify_urgency
    description: Classify email urgency
    grader:
      type: threshold
      rubric:
        - condition: "urgency == 'urgent'"
          reward: 0.95
        - condition: "urgency == 'normal'"
          reward: 0.85

  - name: choose_action
    description: Choose appropriate action
    grader:
      type: threshold
      rubric:
        - condition: "action == 'respond'"
          reward: 0.90
        - condition: "action == 'archive'"
          reward: 0.80

  - name: draft_response
    description: Draft response
    grader:
      type: llm_judge
      prompt: "Evaluate response quality"
