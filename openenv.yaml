version: 1

tasks:
  - id: classify_urgency
    name: classify_urgency
    difficulty: easy
    max_steps: 15
    description: Classify email urgency as urgent or normal
    grader:
      type: llm
      prompt_template: "Score the classification 0.0 to 1.0"

  - id: choose_action
    name: choose_action
    difficulty: medium
    max_steps: 15
    description: Choose appropriate action (respond or archive)
    grader:
      type: llm
      prompt_template: "Score the action choice 0.0 to 1.0"

  - id: draft_response
    name: draft_response
    difficulty: hard
    max_steps: 15
    description: Draft appropriate response for customer email
    grader:
      type: llm
      prompt_template: "Score the response quality 0.0 to 1.0"
