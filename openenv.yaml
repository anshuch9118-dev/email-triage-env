version: 1

tasks:
  - name: classify_urgency
    description: Classify email urgency as urgent or normal
    grader:
      type: threshold
      field: urgency
      rubric:
        - condition: "output == 'urgent'"
          reward: 1.0
        - condition: "output == 'normal'"
          reward: 0.8

  - name: choose_action
    description: Choose appropriate action (respond or archive)
    grader:
      type: threshold
      field: action
      rubric:
        - condition: "output == 'respond'"
          reward: 1.0
        - condition: "output == 'archive'"
          reward: 0.8

  - name: draft_response
    description: Draft appropriate response for customer email
    grader:
      type: llm_judge
      criteria:
        - professionalism
        - relevance
        - completeness
      scale: 1-5
      prompt: |
        You are evaluating a customer support email response.

        Score the response from 1 to 5 based on:
        - Professionalism
        - Relevance to the query
        - Completeness

        Return only a number.
