version: "1.0.0"
name: Email Triage Environment
description: >
  An environment for an AI agent to triage, prioritize, and route 
  corporate emails based on urgency and content.
author: YourName

observation_space:
  type: text
  description: "Raw email text including header, subject, and body."

action_space:
  type: text
  description: "The triage decision made by the agent."

endpoints:
  health: /
  reset:  /reset
  step:   /step
  state:  /state

tasks:
  - id: classify_urgency
    description: "Identify a production outage email and mark as urgent."
    steps: 1
    grader: classify_urgency
  - id: choose_action
    description: "Identify a billing question and decide to respond."
    steps: 1
    grader: choose_action
  - id: draft_response
    description: "Draft a professional response to a customer query."
    steps: 1
    grader: draft_response

scoring:
  reward_range: [0.01, 0.99]
  success_threshold: 0.5
  score_formula: mean(step_rewards)
