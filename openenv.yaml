id: email-triage-env-v1
name: Email Triage Environment
version: 1.0.0
type: environment
sdk: openenv
description: Real-world email triage RL environment with 3 tasks.
entrypoint: server.app:app
author: codeBug01
tasks:
  - id: classify_urgency
    name: Classify Email Urgency
    grader:
      type: http
      endpoint: /grader
      method: POST
  - id: choose_action
    name: Choose Email Action
    grader:
      type: http
      endpoint: /grader
      method: POST
  - id: draft_response
    name: Draft Email Response
    grader:
      type: http
      endpoint: /grader
      method: POST
