version: 1
tasks:
  - id: "classify_urgency"
    name: "Classify Urgency"
    description: "Categorize email urgency"
    difficulty: "easy"
    score_range: [0.1, 0.99]
    grader:
      type: "threshold"
      threshold: 0.5
      condition: "score > 0.5"

  - id: "choose_action"
    name: "Choose Action"
    description: "Select respond or archive"
    difficulty: "medium"
    score_range: [0.1, 0.99]
    grader:
      type: "threshold"
      threshold: 0.5
      condition: "score > 0.5"

  - id: "draft_response"
    name: "Draft Response"
    description: "LLM response generation"
    difficulty: "hard"
    score_range: [0.1, 0.99]
    grader:
      type: "llm_judge"
      prompt: "Rate the response quality from 0.1 to 0.99 based on professionalism."
