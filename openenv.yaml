version: 1
name: EmailTriageEnv
description: "Email triage environment for customer support."

tasks:
  - id: "classify_urgency"  # Must match the API ID exactly
    name: "Classify Urgency"
    difficulty: "easy"
    score_range: [0.1, 0.9] # Strictly not 0 or 1
    grader:
      type: "threshold"
      threshold: 0.5
      condition: "score > 0.5"

  - id: "choose_action"
    name: "Choose Action"
    difficulty: "medium"
    score_range: [0.1, 0.9]
    grader:
      type: "threshold"
      threshold: 0.5
      condition: "score > 0.5"

  - id: "draft_response"
    name: "Draft Response"
    difficulty: "hard"
    score_range: [0.1, 0.9]
    grader:
      type: "llm_judge"
      prompt: "Does the draft professionally resolve the customer inquiry? Rate 0.1 to 0.9."
