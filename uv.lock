version = 1
requires-python = ">=3.10"

[[package]]
name = "email-triage-env"
version = "0.1.0"
source = { editable = "." }
dependencies = [
  { name = "fastapi" },
  { name = "openai" },
  { name = "openenv-core" },
  { name = "pydantic" },
  { name = "requests" },
  { name = "uvicorn" },
]

[package.dev-dependencies]

[package.metadata]
requires-dist = [
  { name = "fastapi" },
  { name = "openai" },
  { name = "openenv-core", specifier = ">=0.2.0" },
  { name = "pydantic" },
  { name = "requests" },
  { name = "uvicorn" },
]

[[package]]
name = "fastapi"
version = "0.115.12"
source = { registry = "https://pypi.org/simple" }
dependencies = [
  { name = "pydantic" },
  { name = "starlette" },
  { name = "typing-extensions" },
]
sdist = { url = "https://files.pythonhosted.org/packages/fastapi-0.115.12.tar.gz" }

